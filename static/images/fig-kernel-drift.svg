<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 320" role="img" aria-label="Kernel attraction-repulsion drift field: blue arrows attract sample x toward data points y-plus, orange arrows show peer y-minus contributions, thick black arrow shows net displacement V(x)">
  <defs>
    <marker id="ka-blue" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#3b82f6"/></marker>
    <marker id="ka-orange" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#f97316"/></marker>
    <marker id="ka-black" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto"><polygon points="0 0,10 4.5,0 9" fill="#111827"/></marker>
    <style>.ka{font-family:Inter,ui-sans-serif,system-ui,sans-serif}</style>
  </defs>
  <rect width="440" height="320" rx="22" fill="#f8fafc"/>
  <!-- x: central sample point -->
  <circle cx="220" cy="178" r="8" fill="#111827"/>
  <text x="233" y="176" class="ka" font-size="15" font-style="italic" fill="#111827">x</text>
  <!-- y+ data points (blue, upper right) -->
  <circle cx="308" cy="82"  r="7" fill="#3b82f6"/>
  <circle cx="348" cy="60"  r="7" fill="#3b82f6"/>
  <circle cx="330" cy="110" r="7" fill="#3b82f6"/>
  <!-- y- peer points (orange, lower left) -->
  <circle cx="108" cy="265" r="7" fill="#f97316"/>
  <circle cx="136" cy="242" r="7" fill="#f97316"/>
  <circle cx="82"  cy="244" r="7" fill="#f97316"/>
  <!-- Blue attraction arrows: x toward each y+ -->
  <line x1="228" y1="171" x2="301" y2="89"  stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ka-blue)"/>
  <line x1="228" y1="171" x2="341" y2="68"  stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ka-blue)"/>
  <line x1="228" y1="171" x2="323" y2="117" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ka-blue)"/>
  <!-- Orange peer arrows: x toward each y- -->
  <line x1="212" y1="185" x2="116" y2="259" stroke="#f97316" stroke-width="1.5" marker-end="url(#ka-orange)"/>
  <line x1="212" y1="185" x2="144" y2="238" stroke="#f97316" stroke-width="1.5" marker-end="url(#ka-orange)"/>
  <line x1="212" y1="185" x2="90"  y2="240" stroke="#f97316" stroke-width="1.5" marker-end="url(#ka-orange)"/>
  <!-- Net V(x): thick black arrow toward upper right -->
  <line x1="220" y1="178" x2="300" y2="110" stroke="#111827" stroke-width="3.5" marker-end="url(#ka-black)"/>
  <!-- V(x) label -->
  <text x="292" y="105" class="ka" font-size="15" font-weight="700" font-style="italic" fill="#111827">V(x)</text>
  <!-- y+ label -->
  <text x="356" y="60" class="ka" font-size="15"><tspan font-style="italic" fill="#1d4ed8">y</tspan><tspan dy="-4" font-size="11" fill="#1d4ed8">+</tspan><tspan dy="4"> </tspan></text>
  <text x="354" y="76" class="ka" font-size="12" fill="#1d4ed8">(data)</text>
  <!-- y- label -->
  <text x="44" y="264" class="ka" font-size="15"><tspan font-style="italic" fill="#c2410c">y</tspan><tspan dy="-4" font-size="11" fill="#c2410c">−</tspan></text>
  <text x="38" y="280" class="ka" font-size="12" fill="#c2410c">(peers)</text>
  <!-- Kernel formula at bottom -->
  <text x="220" y="308" class="ka" font-size="12" fill="#9ca3af" text-anchor="middle">kernel: k(x,y) = exp(−∥x−y∥/τ)</text>
</svg>