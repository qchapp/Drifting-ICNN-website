<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 290" role="img"
     aria-label="Drifting update schematic: orange samples from q-theta are displaced by V(x) vectors toward the blue data distribution p-data">
  <defs>
    <marker id="ds-arr" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#5a6672"/>
    </marker>
    <style>.ds{font-family:Inter,ui-sans-serif,system-ui,sans-serif}</style>
  </defs>
  <rect width="480" height="290" rx="22" fill="#f8fafc"/>
  <!-- q_theta ellipse -->
  <ellipse cx="145" cy="205" rx="105" ry="65" fill="rgba(249,115,22,0.14)" stroke="#f97316" stroke-width="1.8"/>
  <!-- p_data ellipse -->
  <ellipse cx="340" cy="100" rx="105" ry="65" fill="rgba(59,130,246,0.14)" stroke="#3b82f6" stroke-width="1.8"/>
  <!-- Displacement arrows (dashed) -->
  <line x1="115" y1="197" x2="291" y2="121" stroke="#5a6672" stroke-width="1.7" stroke-dasharray="6,4" marker-end="url(#ds-arr)"/>
  <line x1="149" y1="222" x2="296" y2="128" stroke="#5a6672" stroke-width="1.7" stroke-dasharray="6,4" marker-end="url(#ds-arr)"/>
  <line x1="175" y1="203" x2="297" y2="125" stroke="#5a6672" stroke-width="1.7" stroke-dasharray="6,4" marker-end="url(#ds-arr)"/>
  <line x1="135" y1="180" x2="293" y2="116" stroke="#5a6672" stroke-width="1.7" stroke-dasharray="6,4" marker-end="url(#ds-arr)"/>
  <!-- Orange particles (q_theta) -->
  <circle cx="115" cy="197" r="7" fill="#f97316"/>
  <circle cx="149" cy="222" r="7" fill="#f97316"/>
  <circle cx="175" cy="203" r="7" fill="#f97316"/>
  <circle cx="135" cy="180" r="7" fill="#f97316"/>
  <circle cx="162" cy="240" r="7" fill="#f97316"/>
  <!-- Blue particles (p_data) -->
  <circle cx="312" cy="93"  r="7" fill="#3b82f6"/>
  <circle cx="340" cy="113" r="7" fill="#3b82f6"/>
  <circle cx="368" cy="97"  r="7" fill="#3b82f6"/>
  <circle cx="325" cy="123" r="7" fill="#3b82f6"/>
  <circle cx="360" cy="83"  r="7" fill="#3b82f6"/>
  <!-- V(x_i) label -->
  <text x="218" y="154" class="ds" font-size="14" fill="#374151"><tspan font-style="italic">V(x</tspan><tspan dy="4" font-size="10">i</tspan><tspan dy="-4" font-size="14">)</tspan></text>
  <!-- q_theta label -->
  <text x="86" y="275" class="ds" font-size="16"><tspan font-style="italic" fill="#c2410c">q</tspan><tspan dy="4" font-size="11" fill="#c2410c">θ</tspan></text>
  <!-- p_data label -->
  <text x="310" y="46" class="ds" font-size="16"><tspan font-style="italic" fill="#1d4ed8">p</tspan><tspan dy="4" font-size="11" fill="#1d4ed8">data</tspan></text>
</svg>