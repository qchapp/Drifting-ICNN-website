<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 420" role="img" aria-label="Drifting-ICNN method diagram">
  <defs>
    <linearGradient id="box" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#edf7fa" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#007d8a"/>
      <stop offset="1" stop-color="#6554f2"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#007d8a" />
    </marker>
    <style>
      .title{font:700 25px Inter,Arial,sans-serif;fill:#111827}.sub{font:500 17px Inter,Arial,sans-serif;fill:#516071}.math{font:700 26px Inter,Arial,sans-serif;fill:#007d8a}.small{font:600 15px Inter,Arial,sans-serif;fill:#516071}.box{fill:url(#box);stroke:rgba(15,23,42,.16);stroke-width:2}.arrow{stroke:#007d8a;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1180" height="420" rx="34" fill="#f7f9fc"/>
  <circle cx="108" cy="78" r="118" fill="#007d8a" opacity="0.08"/>
  <circle cx="1010" cy="335" r="148" fill="#6554f2" opacity="0.09"/>

  <rect class="box" x="55" y="118" width="190" height="160" rx="24"/>
  <text class="title" x="150" y="168" text-anchor="middle">Noise</text>
  <text class="math" x="150" y="205" text-anchor="middle">ε ~ N(0,I)</text>
  <text class="sub" x="150" y="238" text-anchor="middle">input seed</text>

  <path class="arrow" d="M250 198 H330"/>

  <rect class="box" x="342" y="118" width="220" height="160" rx="24"/>
  <text class="title" x="452" y="160" text-anchor="middle">Generator</text>
  <text class="math" x="452" y="198" text-anchor="middle">x = fθ(ε)</text>
  <text class="sub" x="452" y="232" text-anchor="middle">6D whitened latent</text>

  <path class="arrow" d="M568 198 H648"/>

  <rect class="box" x="660" y="84" width="250" height="228" rx="24"/>
  <text class="title" x="785" y="132" text-anchor="middle">Convex potential</text>
  <text class="math" x="785" y="172" text-anchor="middle">Tω(x)=∇ψω(x)</text>
  <text class="sub" x="785" y="208" text-anchor="middle">ICNN / CCNPF drift</text>
  <text class="small" x="785" y="247" text-anchor="middle">convexity via non-negative</text>
  <text class="small" x="785" y="270" text-anchor="middle">cascade weights + PSD terms</text>

  <path class="arrow" d="M916 198 H990"/>

  <rect class="box" x="1002" y="118" width="128" height="160" rx="24"/>
  <text class="title" x="1066" y="165" text-anchor="middle">Decode</text>
  <text class="math" x="1066" y="202" text-anchor="middle">z → y</text>
  <text class="sub" x="1066" y="235" text-anchor="middle">MNIST</text>

  <path d="M781 316 C760 360, 700 360, 672 318" stroke="url(#accent)" stroke-width="4" fill="none" stroke-dasharray="8 10"/>
  <text class="small" x="726" y="383" text-anchor="middle">inner potential fitting + cycle-consistency diagnostics</text>
</svg>
